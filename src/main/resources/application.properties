spring.application.name=ocyi_java

# Server
server.port=8080
server.servlet.context-path=/

# H2 Datasource - file-based with PostgreSQL compatibility mode
#spring.datasource.url=jdbc:h2:file:~/oyci-data/oyci_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE
spring.datasource.url=jdbc:h2:mem:oyci_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# SQL Init ? run seed data after Hibernate creates the schema
# db-tables.sql is skipped (Hibernate manages DDL); only test data is seeded
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/changelog/db-test-data.sql

# H2 Console
# Enabled manually via H2ConsoleConfig ? Spring Boot's built-in auto-config is
# disabled because in Spring Boot 4.x it routes /h2-console/** through the
# DispatcherServlet which causes "No static resource h2-console/login.do" 404 errors.
spring.h2.console.enabled=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Mail Configuration
# Local dev: Mailpit at localhost:1025 (run via docker-compose)
# Production: set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD env vars
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

